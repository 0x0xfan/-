# 配音配置模板。复制到项目根目录并命名为 tts.config.yaml。
# 把 active 改成你要用的渠道，然后只填写对应渠道。
# 当前脚本已接入：volcengine、minimax。
# 其他渠道先预留配置位，填写后还需要接入对应 API 调用。

